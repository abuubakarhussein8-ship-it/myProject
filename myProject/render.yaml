services:
  - type: web
    name: library-backend
    env: python
    plan: free
    rootDir: backend
    buildCommand: bash build.sh
    startCommand: gunicorn library_project.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DJANGO_SECRET_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DEFAULT_ADMIN_USERNAME
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        value: "https://my-project-sable-beta.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://my-project-sable-beta.vercel.app,https://*.vercel.app,http://localhost:5173,http://127.0.0.1:5173"
